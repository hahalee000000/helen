[build-system]
requires = ["setuptools>=45"]
build-backend = "setuptools.build_meta"

[project]
name = "helen"
version = "0.1.0"
description = "Helen — A Prompt-first Agent Programming Language"
requires-python = ">=3.8"
dependencies = [
    "pyyaml>=6.0",
    "toml>=0.10",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-cov>=4.0", "flake8>=6.0"]

[project.scripts]
helen = "helen.cli.__main__:main"

[tool.setuptools.packages.find]
include = ["helen*"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["helen"]

[tool.flake8]
max-line-length = 120
extend-ignore = ["E501"]
